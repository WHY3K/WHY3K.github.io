<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<meta name="robots" content="noindex, nofollow">
<title>—</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #fbfbfa;
    color: #131316;
    font-family: "SF Mono", "Menlo", "Osaka-Mono", monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  main { text-align: center; }
  .ln {
    font-size: 11px; letter-spacing: .42em; line-height: 3.2;
    opacity: 0; animation: appear 1.2s ease forwards;
    white-space: nowrap;
  }
  .ln:nth-child(1) { animation-delay: .9s; }
  .ln:nth-child(2) { animation-delay: 1.8s; }
  .ln:nth-child(3) { animation-delay: 2.7s; }
  .ln:nth-child(4) { animation-delay: 3.9s; }
  .ln:nth-child(5) { animation-delay: 4.8s; }
  .ln:nth-child(6) { animation-delay: 6s; }
  .ln:nth-child(7) { animation-delay: 6.9s; }
  .ln:nth-child(8) { animation-delay: 8.1s; }
  .ln.dim { color: #9a9aa3; }
  .ln.sp { margin-top: 26px; }
  @keyframes appear { to { opacity: 1; } }

  /* 「9 は とびら」だけ、たまに機械的に痙攣する */
  .ln:nth-child(3) { animation: appear 1.2s ease 2.7s forwards, twitch 9s steps(1) 4.5s infinite; }
  @keyframes twitch {
    0%, 96.9%, 98.3%, 100% { transform: none; }
    97%   { transform: translateX(3px) skewX(-4deg); }
    97.7% { transform: translateX(-2px); }
  }

  .cur {
    display: inline-block; margin-top: 34px; font-size: 11px;
    opacity: 0; animation: appear .1s ease 9.3s forwards;
  }
  .cur::after { content: "▮"; animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .dot {
    position: fixed; right: 12vw; bottom: 18vh;
    width: 5px; height: 5px; border-radius: 50%;
    background: #d21f12;
    animation: breathe 3.69s ease-in-out infinite;
  }
  @keyframes breathe { 50% { opacity: .25; } }
  .back {
    position: fixed; left: 24px; bottom: 22px;
    color: #9a9aa3; text-decoration: none;
    font-size: 12px; letter-spacing: .3em;
    opacity: 0; animation: appear 1s ease 9.9s forwards;
  }
  .back:hover { color: #131316; }
  .coords {
    position: fixed; right: 24px; top: 22px;
    font-size: 9px; letter-spacing: .3em; color: #c9c9d0;
  }
  @media (max-width: 480px) {
    .ln { font-size: 9px; letter-spacing: .3em; }
  }
</style>
</head>
<body>
<main>
  <p class="ln">3 は かたち</p>
  <p class="ln">6 は ながれ</p>
  <p class="ln">9 は とびら</p>
  <p class="ln sp">1 2 4 8 7 5 は 円のなか</p>
  <p class="ln">3 と 6 と 9 だけが その外にいる</p>
  <p class="ln sp">ここは 外がわの部屋 — 見つけた人だけが入れる</p>
  <p class="ln">新しい音と道具は ここに最初に置かれる</p>
  <p class="ln dim">のぞくなら 3・6・9 のつく日がいい</p>
  <br>
  <span class="cur"></span>
</main>
<span class="dot" aria-hidden="true"></span>
<span class="coords" aria-hidden="true">void — 00</span>
<a class="back" href="../" aria-label="戻る">←</a>
</body>
</html>
