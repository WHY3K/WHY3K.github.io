<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>—</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #fbfbfa;
    color: #131316;
    font-family: "SF Mono", "Menlo", "Osaka-Mono", monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  main { text-align: center; }
  .ln {
    font-size: 11px; letter-spacing: .42em; line-height: 3.2;
    opacity: 0; animation: appear 1.2s ease forwards;
    white-space: nowrap;
  }
  .ln:nth-child(1) { animation-delay: .8s; }
  .ln:nth-child(2) { animation-delay: 2.2s; }
  .ln:nth-child(3) { animation-delay: 3.6s; }
  .ln:nth-child(4) { animation-delay: 5.2s; color: #9a9aa3; }
  @keyframes appear { to { opacity: 1; } }

  /* 2行目だけ、たまに機械的に痙攣する */
  .ln:nth-child(2) { animation: appear 1.2s ease 2.2s forwards, twitch 7s steps(1) 4s infinite; }
  @keyframes twitch {
    0%, 96.9%, 98.3%, 100% { transform: none; }
    97%   { transform: translateX(3px) skewX(-4deg); }
    97.7% { transform: translateX(-2px); }
  }

  .cur {
    display: inline-block; margin-top: 34px; font-size: 11px;
    opacity: 0; animation: appear .1s ease 6.6s forwards;
  }
  .cur::after { content: "▮"; animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .dot {
    position: fixed; right: 12vw; bottom: 18vh;
    width: 5px; height: 5px; border-radius: 50%;
    background: #d21f12;
  }
  .back {
    position: fixed; left: 24px; bottom: 22px;
    color: #9a9aa3; text-decoration: none;
    font-size: 12px; letter-spacing: .3em;
    opacity: 0; animation: appear 1s ease 7.4s forwards;
  }
  .back:hover { color: #131316; }
  .coords {
    position: fixed; right: 24px; top: 22px;
    font-size: 9px; letter-spacing: .3em; color: #c9c9d0;
  }
  @media (max-width: 480px) {
    .ln { font-size: 9px; letter-spacing: .3em; }
  }
</style>
</head>
<body>
<main>
  <p class="ln">ここは 地図にのっていない部屋</p>
  <p class="ln">見つけた人だけが 入れる</p>
  <p class="ln">新しい音や道具は ここに最初に置く</p>
  <p class="ln">また来て</p>
  <br>
  <span class="cur"></span>
</main>
<span class="dot" aria-hidden="true"></span>
<span class="coords" aria-hidden="true">void — 00</span>
<a class="back" href="../" aria-label="戻る">←</a>
</body>
</html>
