<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<meta name="robots" content="noindex, nofollow">
<title>—</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #fbfbfa;
    color: #131316;
    font-family: "SF Mono", "Menlo", "Osaka-Mono", monospace;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  main { text-align: center; position: relative; z-index: 1; }
  .schem {
    position: fixed; left: 50%; top: 50%;
    width: min(94vw, 660px);
    transform: translate(-50%, -50%);
    opacity: 0; pointer-events: none;
    animation: schemin 2.4s ease .4s forwards;
  }
  @keyframes schemin { to { opacity: .16; } }
  @media (prefers-reduced-motion: no-preference) {
    .schem { animation: schemin 2.4s ease .4s forwards, schemspin 420s linear infinite; }
  }
  @keyframes schemspin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  .ln {
    font-size: 11px; letter-spacing: .42em; line-height: 3.2;
    opacity: 0; animation: appear 1.2s ease forwards;
    white-space: nowrap;
  }
  .ln:nth-child(1) { animation-delay: .9s; }
  .ln:nth-child(2) { animation-delay: 2.4s; }
  .ln:nth-child(3) { animation-delay: 3.9s; }
  .ln.dim { color: #9a9aa3; }
  @keyframes appear { to { opacity: 1; } }

  /* 「地図にない部屋」だけ、たまに機械的に痙攣する */
  .ln:nth-child(1) { animation: appear 1.2s ease .9s forwards, twitch 9s steps(1) 4.5s infinite; }
  @keyframes twitch {
    0%, 96.9%, 98.3%, 100% { transform: none; }
    97%   { transform: translateX(3px) skewX(-4deg); }
    97.7% { transform: translateX(-2px); }
  }

  .cur {
    display: inline-block; margin-top: 34px; font-size: 11px;
    opacity: 0; animation: appear .1s ease 5.1s forwards;
  }
  .cur::after { content: "▮"; animation: blink 1.2s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .dot {
    position: fixed; right: 12vw; bottom: 18vh;
    width: 5px; height: 5px; border-radius: 50%;
    background: #d21f12;
    animation: breathe 3.69s ease-in-out infinite;
  }
  @keyframes breathe { 50% { opacity: .25; } }
  /* 住人：ポンッと現れて、舟を漕ぎながら居眠り */
  .resident {
    position: fixed; left: 16vw; bottom: 10vh;
    opacity: 0;
    transform-origin: 50% 100%;
    animation: popin .7s cubic-bezier(.34, 1.56, .64, 1) 6.5s forwards;
  }
  .resident img {
    display: block; height: 320px; width: auto;
    transform-origin: 50% 96%;
    animation: doze 3.7s ease-in-out 7.3s infinite;
  }
  @keyframes popin {
    0%   { opacity: 0; transform: scale(0); }
    60%  { opacity: 1; transform: scale(1.12); }
    80%  { transform: scale(.96); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes doze {
    0%, 100% { transform: rotate(0deg); }
    55%      { transform: rotate(2.4deg) translateY(1px); }
  }
  .z {
    position: absolute; top: -4px; left: 68%;
    font-size: 13px; letter-spacing: 0;
    opacity: 0;
    animation: zfloat 4.8s ease-in 7.6s infinite;
  }
  .z:nth-of-type(2) { font-size: 11px; animation-delay: 9.2s; }
  .z:nth-of-type(3) { font-size: 9px;  animation-delay: 10.8s; }
  @keyframes zfloat {
    0%   { opacity: 0; transform: translate(0, 0) rotate(0deg); }
    12%  { opacity: .75; }
    60%  { opacity: .45; }
    100% { opacity: 0; transform: translate(16px, -38px) rotate(14deg); }
  }
  @media (max-width: 480px) { .resident img { height: 220px; } .resident { left: 8vw; } }
  .back {
    position: fixed; left: 24px; bottom: 22px;
    color: #9a9aa3; text-decoration: none;
    font-size: 12px; letter-spacing: .3em;
    opacity: 0; animation: appear 1s ease 5.9s forwards;
  }
  .back:hover { color: #131316; }
  .coords {
    position: fixed; right: 24px; top: 22px;
    font-size: 9px; letter-spacing: .3em; color: #c9c9d0;
  }
  @media (max-width: 480px) {
    .ln { font-size: 9px; letter-spacing: .3em; }
  }
</style>
</head>
<body>
<img class="schem" src="../assets/schematic.svg" alt="" aria-hidden="true">
<main>
  <p class="ln">ここは 地図にない部屋</p>
  <p class="ln">できたての音と道具は まず ここに置かれる</p>
  <p class="ln dim">気が向いたら また来て</p>
  <br>
  <span class="cur"></span>
</main>
<span class="dot" aria-hidden="true"></span>
<span class="coords" aria-hidden="true">void — 00</span>
<div class="resident" aria-hidden="true">
  <img src="../assets/chara2d.png" alt="">
  <span class="z">z</span><span class="z">z</span><span class="z">z</span>
</div>
<a class="back" href="../" aria-label="戻る">←</a>
</body>
</html>
