<head>
<meta charset="utf-8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fafafc;
    --ink: #0d0d11;
    --ink-soft: #8a8a95;
    --line: #c9c9d2;
    --cyan: #00e0ff;
    --mag: #ff2bd6;
    --grn: #33d15e;
    --cut: 14px;
    --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :focus { outline:none; }
  :focus-visible { outline:2px solid rgba(13,13,17,.5); outline-offset:3px; }

  html, body { height:100%; }
  body {
    font-family: "Space Grotesk", -apple-system, "Helvetica Neue", sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }

  /* ---- 背景レイヤー1：グリッド＋スキャンライン ---- */
  body::before {
    content: "";
    position: fixed; inset: 0;
    z-index: -1;
    background:
      repeating-linear-gradient(0deg,  rgba(13,13,17,.045) 0 1px, transparent 1px 44px),
      repeating-linear-gradient(90deg, rgba(13,13,17,.045) 0 1px, transparent 1px 44px),
      repeating-linear-gradient(0deg,  rgba(13,13,17,.012) 0 1px, transparent 1px 4px);
    pointer-events: none;
  }
  /* ---- 背景レイヤー2：漂うホログラム光 ---- */
  body::after {
    content: "";
    position: fixed; inset: -20%;
    z-index: -2;
    background:
      radial-gradient(620px 420px at 18% 28%, rgba(0,224,255,.14), transparent 62%),
      radial-gradient(700px 520px at 84% 72%, rgba(255,43,214,.11), transparent 62%),
      radial-gradient(520px 420px at 62% 6%,  rgba(51,209,94,.10),  transparent 62%);
    filter: blur(46px);
    pointer-events: none;
  }
  @media (prefers-reduced-motion: no-preference) {
    body::after { animation: drift 16s ease-in-out infinite alternate; }
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-3%, 2.5%) scale(1.06); }
  }

  /* ---- 画面を横切るグリッチバー ---- */
  .glitch-bar {
    position: fixed;
    left: 0; right: 0;
    height: 26px;
    z-index: 3;
    background: rgba(13,13,17,.05);
    box-shadow: 0 0 0 1px rgba(0,224,255,.08);
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: no-preference) {
    .glitch-bar { animation: bar 9s infinite steps(1); }
    .glitch-bar.b2 { animation-delay: 4.7s; height: 8px; }
  }
  @keyframes bar {
    0%, 87.9%, 90.1%, 100% { opacity: 0; }
    88%   { opacity: 1; top: 22%; transform: translateX(-8px); }
    88.7% { opacity: 1; top: 61%; transform: translateX(10px); }
    89.4% { opacity: 1; top: 43%; transform: translateX(-4px); }
  }

  main {
    flex: 1;
    width: 100%;
    max-width: 480px;
    padding: 0 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 56px;
    position: relative;
    z-index: 1;
  }

  /* ---- ワードマーク ---- */
  .mark { text-align: center; user-select: none; }
  .wordmark {
    position: relative;
    display: inline-block;
    font-family: "Orbitron", sans-serif;
    font-weight: 900;
    font-size: clamp(42px, 12vw, 76px);
    letter-spacing: .12em;
    margin-right: -.12em;
    line-height: 1;
    color: var(--ink);
  }
  .wordmark::before,
  .wordmark::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    opacity: 0;
    pointer-events: none;
  }
  .wordmark::before { color: var(--mag); z-index: -1; }
  .wordmark::after  { color: var(--cyan); z-index: -1; }
  @media (prefers-reduced-motion: no-preference) {
    .wordmark          { animation: jolt 3.4s infinite steps(1); }
    .wordmark::before  { animation: ghostM 3.4s infinite steps(1); }
    .wordmark::after   { animation: ghostC 3.4s infinite steps(1); }
  }
  /* 本体がときどき歪む */
  @keyframes jolt {
    0%, 88.9%, 93.1%, 100% { transform: none; }
    89%   { transform: skewX(-6deg) translateX(2px); }
    89.6% { transform: skewX(4deg); }
    90.2% { transform: none; }
    91.5% { transform: translateX(-2px); }
    92.1% { transform: none; }
  }
  /* マゼンタのゴースト */
  @keyframes ghostM {
    0%, 88.9%, 93.6%, 100% { opacity: 0; }
    89%   { opacity:.85; transform: translate(4px, 0);   clip-path: inset(8% 0 64% 0); }
    89.8% { opacity:.85; transform: translate(-3px, 1px); clip-path: inset(52% 0 22% 0); }
    90.6% { opacity:.6;  transform: translate(2px, -1px); clip-path: inset(28% 0 48% 0); }
    91.6% { opacity:.85; transform: translate(-4px, 0);  clip-path: inset(70% 0 6% 0); }
    92.4% { opacity:.5;  transform: translate(3px, 0);   clip-path: inset(14% 0 70% 0); }
  }
  /* シアンのゴースト */
  @keyframes ghostC {
    0%, 88.9%, 93.6%, 100% { opacity: 0; }
    89.3% { opacity:.85; transform: translate(-4px, 0);  clip-path: inset(60% 0 14% 0); }
    90.1% { opacity:.85; transform: translate(3px, -1px); clip-path: inset(4% 0 76% 0); }
    90.9% { opacity:.6;  transform: translate(-2px, 1px); clip-path: inset(38% 0 40% 0); }
    91.9% { opacity:.85; transform: translate(4px, 0);   clip-path: inset(22% 0 58% 0); }
    92.7% { opacity:.5;  transform: translate(-3px, 0);  clip-path: inset(80% 0 2% 0); }
  }

  .status {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .5em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .status::after {
    content: "▮";
    letter-spacing: 0;
    margin-left: .2em;
    color: var(--grn);
  }
  @media (prefers-reduced-motion: no-preference) {
    .status::after { animation: blink 1.1s steps(2) infinite; }
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- リンク ---- */
  .links { display: flex; flex-direction: column; gap: 12px; }
  .link {
    display: block;
    padding: 1px;
    background: var(--line);
    clip-path: polygon(
      var(--cut) 0, 100% 0,
      100% calc(100% - var(--cut)),
      calc(100% - var(--cut)) 100%,
      0 100%, 0 var(--cut)
    );
    text-decoration: none;
    color: var(--ink);
    transition: transform .13s ease, background .15s;
  }
  .link .in {
    display: flex;
    align-items: center;
    gap: 14px;
    height: 58px;
    padding: 0 24px;
    background: rgba(255,255,255,.92);
    clip-path: polygon(
      var(--cut) 0, 100% 0,
      100% calc(100% - var(--cut)),
      calc(100% - var(--cut)) 100%,
      0 100%, 0 var(--cut)
    );
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    transition: background .15s, color .15s;
  }
  .link .idx {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--ink-soft);
  }
  .link .arrow { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }

  .link:hover { transform: translateY(-2px); background: var(--ink); }
  .link:hover .in { background: var(--ink); color: #fff; text-shadow: 2px 0 var(--cyan), -2px 0 var(--mag); }
  .link:hover .idx, .link:hover .arrow { color: rgba(255,255,255,.6); }
  .link:active { transform: translateY(0) scale(.99); }

  /* PLUGINS＝主役 */
  .link.primary { background: var(--ink); }
  .link.primary .in { background: var(--ink); color: #fff; }
  .link.primary .idx { color: rgba(255,255,255,.5); }
  .link.primary .tag {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .25em;
    color: var(--grn);
  }
  .link.primary:hover .in { background: #fff; color: var(--ink); text-shadow: 2px 0 var(--mag), -2px 0 var(--cyan); }
  .link.primary:hover .tag { color: #1f8f42; }

  /* URL未設定（準備中） */
  .link.soon { pointer-events: none; background: #e8e8ee; }
  .link.soon .in { background: rgba(252,252,254,.9); color: #c3c3cc; }
  .link.soon .idx { color: #d3d3db; }
  .link.soon .soon-tag {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .22em;
    color: #d3d3db;
  }

  footer {
    padding: 28px 0 34px;
    font-size: 11px;
    letter-spacing: .3em;
    color: var(--ink-soft);
    font-family: var(--mono);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
