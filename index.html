<style>
  :root {
    --paper: #fbfbfa;
    --ink: #131316;
    --ink-soft: #9a9aa3;
    --faint: #c9c9d0;
    --line: #e2e2e7;
    --red: #d21f12;
    --mono: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :focus { outline:none; }
  :focus-visible { outline:2px solid rgba(19,19,22,.5); outline-offset:3px; }

  html, body { min-height:100%; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }
  /* 微細な十字ドットグリッド（計測紙） */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: 0;
    background-image: radial-gradient(circle, rgba(19,19,22,.13) .7px, transparent .8px);
    background-size: 56px 56px;
    background-position: 28px 28px;
    pointer-events: none;
  }

  /* ---- 四隅のトンボ（registration marks） ---- */
  .reg { position: fixed; width: 16px; height: 16px; z-index: 2; pointer-events:none; }
  .reg.tl { top:14px; left:14px;  border-top:2px solid var(--ink); border-left:2px solid var(--ink); }
  .reg.tr { top:14px; right:14px; border-top:2px solid var(--ink); border-right:2px solid var(--ink); }
  .reg.bl { bottom:14px; left:14px;  border-bottom:2px solid var(--ink); border-left:2px solid var(--ink); }
  .reg.br { bottom:14px; right:14px; border-bottom:2px solid var(--ink); border-right:2px solid var(--ink); }

  /* ---- ドキュメントの見出し（左上） ---- */
  .doc-head {
    position: fixed; top: 22px; left: 40px; z-index: 2;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .22em;
    color: var(--ink); text-transform: uppercase;
  }
  .doc-head .bar { width: 46px; height: 10px; background: var(--ink); }

  /* ---- 右端の縦書きキャプション ---- */
  .side-cap {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    writing-mode: vertical-rl; z-index: 2;
    font-family: var(--mono); font-size: 10px; letter-spacing: .5em;
    color: var(--ink-soft); text-transform: uppercase; pointer-events:none;
  }

  /* ---- 散らばる座標ラベル ---- */
  .coord {
    position: fixed; z-index: 1;
    font-family: var(--mono); font-size: 9px; letter-spacing: .08em;
    color: #bdbdc5; pointer-events: none; white-space: nowrap;
  }
  .coord::before { content: "⌐ "; color: #a9a9b2; }

  main {
    flex: 1;
    width: 100%;
    max-width: 560px;
    padding: 72px 30px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  /* ---- 図版（軌道図＋ワードマーク） ---- */
  .figure { position: relative; width: min(92vw, 540px); aspect-ratio: 1 / .82; }
  .figure svg { position:absolute; inset:0; width:100%; height:100%; }
  @media (prefers-reduced-motion: no-preference) {
    .orbitA { animation: spin 90s linear infinite; transform-origin: 300px 246px; }
    .orbitB { animation: spinR 130s linear infinite; transform-origin: 300px 246px; }
    .redarc { animation: spinR 60s linear infinite; transform-origin: 300px 246px; }
  }
  @keyframes spin  { to { transform: rotate(360deg); } }
  @keyframes spinR { to { transform: rotate(-360deg); } }

  .wordwrap {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .wordmark {
    position: relative;
    display: inline-block;
    font-family: var(--sans);
    font-weight: 800;
    font-size: clamp(40px, 11vw, 62px);
    letter-spacing: .06em;
    line-height: 1.05;
    color: var(--ink);
    background: var(--paper);           /* 背後の軸線を切る＝図面の抜き */
    padding: 2px 18px 6px;
    border-bottom: 4px solid var(--ink); /* 下線＝見出しの扱い */
  }
  .wordmark::before,
  .wordmark::after {
    content: attr(data-text);
    position: absolute; left: 0; top: 2px;
    width: 100%; padding: 0 18px;
    opacity: 0; pointer-events: none;
  }
  .wordmark::before { color: var(--red); }
  .wordmark::after  { color: #b0b0b8; }
  @media (prefers-reduced-motion: no-preference) {
    .wordmark          { animation: jolt 5.8s infinite steps(1); }
    .wordmark::before  { animation: ghostR 5.8s infinite steps(1); }
    .wordmark::after   { animation: ghostG 5.8s infinite steps(1); }
  }
  @keyframes jolt {
    0%, 91.9%, 95.1%, 100% { transform: none; }
    92%   { transform: translateX(2px) skewX(-3deg); }
    92.8% { transform: translateX(-1px); }
    93.6% { transform: none; }
    94.2% { transform: translateX(1px); }
  }
  @keyframes ghostR {
    0%, 91.9%, 95.4%, 100% { opacity: 0; }
    92%   { opacity:.7; transform: translate(3px,0);  clip-path: inset(10% 0 58% 0); }
    93%   { opacity:.7; transform: translate(-3px,0); clip-path: inset(56% 0 16% 0); }
    94%   { opacity:.45; transform: translate(2px,0); clip-path: inset(30% 0 42% 0); }
  }
  @keyframes ghostG {
    0%, 91.9%, 95.4%, 100% { opacity: 0; }
    92.4% { opacity:.6; transform: translate(-3px,0); clip-path: inset(64% 0 8% 0); }
    93.4% { opacity:.6; transform: translate(3px,0);  clip-path: inset(2% 0 74% 0); }
    94.4% { opacity:.4; transform: translate(-2px,0); clip-path: inset(40% 0 34% 0); }
  }
  .fig-cap {
    margin-top: 10px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .3em;
    color: var(--ink-soft); text-transform: uppercase;
  }
  .fig-cap::after { content: "▮"; margin-left: .3em; color: var(--red); }
  @media (prefers-reduced-motion: no-preference) {
    .fig-cap::after { animation: blink 1.2s steps(2) infinite; }
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- リンク＝図面の索引リスト ---- */
  .links {
    width: 100%;
    display: flex; flex-direction: column;
    margin-top: 26px;
  }
  .link {
    display: flex; align-items: center; gap: 16px;
    height: 54px;
    border-top: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    font-size: 13px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    transition: background .15s, padding-left .15s;
    position: relative;
  }
  .link:last-of-type { border-bottom: 1px solid var(--line); }
  .link .idx { font-family: var(--mono); font-size: 10px; font-weight: 400; color: var(--ink-soft); width: 2.2em; }
  .link .lead { flex: 1; border-top: 1px dotted var(--faint); margin-top: 2px; }
  .link .mk { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }
  .link:hover { background: #f3f3f4; padding-left: 10px; }
  .link:hover .idx { color: var(--red); }
  .link:hover .mk { color: var(--red); }
  .link:active { background: #ececee; }

  /* PLUGINS＝主索引 */
  .link.primary {
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink) !important;
    height: 60px;
    font-size: 14px;
  }
  .link.primary .mk { color: var(--red); font-weight: 700; letter-spacing: .18em; }
  .link.primary:hover { background: var(--ink); color: #fff; }
  .link.primary:hover .idx { color: rgba(255,255,255,.6); }
  .link.primary:hover .lead { border-color: rgba(255,255,255,.3); }

  /* URL未設定（準備中） */
  .link.soon { pointer-events: none; color: #c6c6cd; }
  .link.soon .idx, .link.soon .mk { color: #d4d4da; }

  /* ---- フッター（スケールバー＋ページ番号） ---- */
  footer {
    width: 100%; max-width: 560px;
    padding: 40px 30px 30px;
    display: flex; align-items: flex-end; justify-content: space-between;
    position: relative; z-index: 1;
  }
  .scale { font-family: var(--mono); font-size: 9px; color: var(--ink-soft); }
  .scale svg { display: block; margin-bottom: 4px; }
  .pageno { font-family: var(--mono); font-size: 11px; letter-spacing: .2em; color: var(--ink); }
  .copyright { font-family: var(--mono); font-size: 9px; letter-spacing: .22em; color: var(--ink-soft); }

  @media (max-width: 640px) {
    .coord.hide-m, .side-cap { display: none; }
    .doc-head { left: 24px; }
    main { padding-top: 64px; }
  }
</style>
</head>
